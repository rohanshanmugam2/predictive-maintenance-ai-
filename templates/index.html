<!DOCTYPE html>
<html>

<head>

    <title>Predictive Maintenance AI</title>

    <style>

        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {

            background-color: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 700px;

            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        h3 {
            margin-top: 20px;
        }

        textarea {

            width: 100%;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 15px;
            background-color: #334155;
            color: white;
        }

        button {

            width: 100%;
            margin-top: 30px;
            padding: 15px;

            background-color: #3b82f6;
            color: white;

            border: none;
            border-radius: 10px;

            font-size: 18px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background-color: #2563eb;
        }

        #result {

            text-align: center;
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
        }

        .subtitle {

            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>⚙️ Predictive Maintenance AI</h1>

    <p class="subtitle">
        Real-Time Tool Wear Prediction using Machine Learning
    </p>

    <h3>Vibration X</h3>
    <textarea id="vib_x" rows="3"></textarea>

    <h3>Vibration Y</h3>
    <textarea id="vib_y" rows="3"></textarea>

    <h3>Vibration Z</h3>
    <textarea id="vib_z" rows="3"></textarea>

    <button onclick="predict()">
        Predict Tool Condition
    </button>

    <div id="result"></div>

</div>

<script>

async function predict() {

    const vib_x = document.getElementById("vib_x").value;
    const vib_y = document.getElementById("vib_y").value;
    const vib_z = document.getElementById("vib_z").value;

    const response = await fetch("/predict", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            vib_x: vib_x,
            vib_y: vib_y,
            vib_z: vib_z
        })

    });

    const result = await response.json();

    let prediction = result.prediction;

    if (prediction === "Healthy") {

        document.getElementById("result").innerHTML =
            "🟢 HEALTHY TOOL";

    }

    else if (prediction === "Moderate Wear") {

        document.getElementById("result").innerHTML =
            "🟡 MODERATE WEAR";

    }

    else {

        document.getElementById("result").innerHTML =
            "🔴 WORN TOOL";

    }
}

</script>

</body>
</html>
